name: Download Resources

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release with the resources'
        type: boolean
        default: false
      tag_name:
        description: 'Tag name for release (e.g., resources-v1.0.0)'
        type: string
        required: false

env:
  BUN_INSTALL_REGISTRY: 'https://registry.npmjs.org/'

jobs:
  # Build all CLI bundles on each target platform (x64 and arm64)
  build-platform-bundles:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }} bundles
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - platform: macos
            arch: arm64
            os: macos-14
          - platform: macos
            arch: x64
            os: macos-14
          - platform: windows
            arch: x64
            os: windows-2022
          - platform: windows
            arch: arm64
            os: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build claude-code
        run: node scripts/download-claude-code.js --force
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Build gemini-cli
        run: node scripts/download-gemini-cli.js --force
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Build openclaw
        run: node scripts/download-openclaw.js --force
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: List resources
        shell: bash
        run: ls -lh resources/*.tgz

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: bundles-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            resources/claude-code.tgz
            resources/gemini-cli.tgz
            resources/openclaw.tgz
          retention-days: 7

  create-release:
    name: Create Resources Release
    runs-on: ubuntu-latest
    needs: [build-platform-bundles]
    if: inputs.create_release && inputs.tag_name != ''

    steps:
      - name: Download macOS arm64 bundles
        uses: actions/download-artifact@v7
        with:
          name: bundles-macos-arm64
          path: tmp/macos-arm64/

      - name: Download macOS x64 bundles
        uses: actions/download-artifact@v7
        with:
          name: bundles-macos-x64
          path: tmp/macos-x64/

      - name: Download Windows x64 bundles
        uses: actions/download-artifact@v7
        with:
          name: bundles-windows-x64
          path: tmp/windows-x64/

      - name: Download Windows arm64 bundles
        uses: actions/download-artifact@v7
        with:
          name: bundles-windows-arm64
          path: tmp/windows-arm64/

      - name: Organize release assets
        run: |
          mkdir -p release-assets

          # macOS arm64
          cp tmp/macos-arm64/claude-code.tgz release-assets/claude-code-macos-arm64.tgz
          cp tmp/macos-arm64/gemini-cli.tgz release-assets/gemini-cli-macos-arm64.tgz
          cp tmp/macos-arm64/openclaw.tgz release-assets/openclaw-macos-arm64.tgz

          # macOS x64
          cp tmp/macos-x64/claude-code.tgz release-assets/claude-code-macos-x64.tgz
          cp tmp/macos-x64/gemini-cli.tgz release-assets/gemini-cli-macos-x64.tgz
          cp tmp/macos-x64/openclaw.tgz release-assets/openclaw-macos-x64.tgz

          # Windows x64
          cp tmp/windows-x64/claude-code.tgz release-assets/claude-code-windows-x64.tgz
          cp tmp/windows-x64/gemini-cli.tgz release-assets/gemini-cli-windows-x64.tgz
          cp tmp/windows-x64/openclaw.tgz release-assets/openclaw-windows-x64.tgz

          # Windows arm64
          cp tmp/windows-arm64/claude-code.tgz release-assets/claude-code-windows-arm64.tgz
          cp tmp/windows-arm64/gemini-cli.tgz release-assets/gemini-cli-windows-arm64.tgz
          cp tmp/windows-arm64/openclaw.tgz release-assets/openclaw-windows-arm64.tgz

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: CLI Resources ${{ inputs.tag_name }}
          body: |
            ## CLI Bundles
            Built with Node.js v24.9.0 runtime requirement.

            | Platform | Arch | Files |
            |----------|------|-------|
            | macOS | arm64 | claude-code-macos-arm64.tgz, gemini-cli-macos-arm64.tgz, openclaw-macos-arm64.tgz |
            | macOS | x64 | claude-code-macos-x64.tgz, gemini-cli-macos-x64.tgz, openclaw-macos-x64.tgz |
            | Windows | x64 | claude-code-windows-x64.tgz, gemini-cli-windows-x64.tgz, openclaw-windows-x64.tgz |
            | Windows | arm64 | claude-code-windows-arm64.tgz, gemini-cli-windows-arm64.tgz, openclaw-windows-arm64.tgz |
          files: release-assets/*
          draft: false
          prerelease: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}